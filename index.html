<!DOCTYPE html>
<html>
<head>
    <title>AI Skin Sense</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
</head>

<body>

<div class="container">

    <h1>✨ AI Skin Sense</h1>
    <p class="subtitle">Smart Skin Type Detection & Care Recommendation</p>

    <button class="toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <div class="upload-box">
        <input type="file" id="imageUpload" onchange="previewImage()">
        <button class="btn" onclick="predictImage()">Predict Image</button>
        <button class="btn camera" onclick="startCamera()">Start Camera</button>
    </div>

    <div class="preview-section">
        <img id="preview" width="250" style="display:none">
        <div id="webcam-container"></div>
    </div>

    <div class="result-card">
        <h2 id="prediction">Prediction will appear here</h2>
        <p id="recommendation">Skin care recommendation will appear here</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
